<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 112">
  <!-- Shadow -->
  <ellipse cx="60" cy="108" rx="28" ry="4" fill="rgba(0,0,0,0.18)"/>
  <!-- Left arm -->
  <path d="M 32 74 Q 18 84 22 95" stroke="#4ade80" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M 88 74 Q 102 84 98 95" stroke="#4ade80" stroke-width="9" fill="none" stroke-linecap="round"/>
  <!-- Left foot -->
  <ellipse cx="20" cy="97" rx="11" ry="6" fill="#22c55e" transform="rotate(-18,20,97)"/>
  <ellipse cx="12" cy="100" rx="5.5" ry="3.5" fill="#22c55e"/>
  <!-- Right foot -->
  <ellipse cx="100" cy="97" rx="11" ry="6" fill="#22c55e" transform="rotate(18,100,97)"/>
  <ellipse cx="108" cy="100" rx="5.5" ry="3.5" fill="#22c55e"/>
  <!-- Body -->
  <ellipse cx="60" cy="76" rx="36" ry="28" fill="#4ade80"/>
  <!-- Tummy -->
  <ellipse cx="60" cy="81" rx="21" ry="16" fill="#bbf7d0"/>
  <!-- Left eye bulge -->
  <ellipse cx="41" cy="50" rx="15" ry="14" fill="#4ade80"/>
  <!-- Right eye bulge -->
  <ellipse cx="79" cy="50" rx="15" ry="14" fill="#4ade80"/>
  <!-- Left eye white -->
  <circle cx="41" cy="50" r="10.5" fill="white"/>
  <!-- Right eye white -->
  <circle cx="79" cy="50" r="10.5" fill="white"/>
  <!-- Left pupil -->
  <circle cx="42" cy="50" r="5.5" fill="#0f172a"/>
  <!-- Right pupil -->
  <circle cx="80" cy="50" r="5.5" fill="#0f172a"/>
  <!-- Left pupil highlight -->
  <circle cx="45" cy="46" r="2.5" fill="white"/>
  <!-- Right pupil highlight -->
  <circle cx="83" cy="46" r="2.5" fill="white"/>
  <!-- Nostrils -->
  <circle cx="55" cy="43" r="2.5" fill="#22c55e"/>
  <circle cx="65" cy="43" r="2.5" fill="#22c55e"/>
  <!-- Smile -->
  <path d="M 47 69 Q 60 76 73 69" stroke="#15803d" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
